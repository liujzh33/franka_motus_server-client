# Configuration for Motus with WAN Backbone and VLM Direct MoT
# Franka LeRobot dataset (place_objects_into_the_box_rc_0524 + stack_bowls_rc)
# action_dim=7, state_dim=7, no subtask/progress labels

common:
  # Robot dimensions (Franka 7-DOF)
  action_dim: 7          # Robot action dimension
  state_dim: 7           # Robot state dimension

  # Video settings (for WAN 5B)
  num_video_frames: 8    # Number of video frames
  video_height: 384      # Video frame height
  video_width: 320       # Video frame width

  # Sampling strategy parameters
  global_downsample_rate: 3
  video_action_freq_ratio: 2

# Dataset configuration
dataset:
  type: "lerobot"           # Use LeRobot dataset format (franka data is LeRobot v3.0)
  dataset_dir: "/home/ma-user/work/wx1513998/franka_data"

  # Task selection (multi-task: both franka datasets)
  task_mode: "multi"
  task_name: ["place_objects_into_the_box_rc_0524", "stack_bowls_rc"]

  max_episodes: null
  image_aug: false

  params:
    # Embodiment type for loading normalization statistics (franka entry in stat.json)
    embodiment_type: "franka"

    # Custom camera key mapping (franka data uses global_image/right_image/wrist_image
    # instead of the standard observation.images.cam_high/cam_left_wrist/cam_right_wrist)
    cam_high_key: "global_image"
    cam_left_wrist_key: "wrist_image"
    cam_right_wrist_key: "right_image"

    # T5 embedding fallback (encode on-the-fly if cache missing, cache to t5_embedding/)
    enable_t5_fallback: true
    t5_wan_path: "/home/ma-user/work/wx1513998/pretrained_models"
    t5_folder_name: "t5_embedding"
    t5_text_len: 512

# Model configuration
model:
  # WAN Video Model settings
  wan:
    checkpoint_path: "/home/ma-user/work/wx1513998/pretrained_models/Wan2.2-TI2V-5B"
    vae_path: "/home/ma-user/work/wx1513998/pretrained_models/Wan2.2-TI2V-5B/Wan2.2_VAE.pth"
    config_path: "/home/ma-user/work/wx1513998/pretrained_models/Wan2.2-TI2V-5B"
    precision: "bfloat16"

  # VLM settings (Qwen3-VL-2B - trainable)
  vlm:
    checkpoint_path: "/home/ma-user/work/wx1513998/pretrained_models/Qwen3-VL-2B-Instruct"
    precision: "bfloat16"
    frozen: false             # VLM is trainable (not frozen)

  # Qwen3-VL Expert settings (per-layer QKV projections for direct MoT)
  qwen3_expert:
    vlm_dim: 2048             # Qwen3-VL-2B hidden size
    head_dim: 128             # Head dimension (matches WAN)
    num_heads: 24             # Number of heads (matches WAN 5B)
    num_layers: 30            # Number of layers (matches WAN)
    norm_eps: 1e-5

  # Action Expert configuration
  action_expert:
    hidden_size: 1024        # Hidden dimension (same as original Motus)
    ffn_dim_multiplier: 4    # FFN = hidden_size * multiplier
    norm_eps: 1e-5

  # Time distribution settings
  time_distribution:
    timestep_sample_method: "logit_normal"
    sigmoid_scale: 1.0
    min_t: 0.0
    max_t: 1.0

  # Training mode
  training_mode: "finetune"   # "pretrain" (action only) or "finetune" (state+action)

  # Inference settings
  inference:
    num_inference_timesteps: 10

  # Loss weights
  loss_weights:
    video_loss_weight: 1.0
    action_loss_weight: 1.0

  # Subtask prediction (DISABLED - franka data has no subtask labels)
  subtask_prediction:
    enabled: false
    mode: "mot_decoder"
    loss_weight: 0.2
    decoder_d_model: 2048
    decoder_layers: 2
    decoder_heads: 16
    decoder_ffn_dim: 8192
    max_length: 64
    use_vlm_memory: false

  # Progress detection (DISABLED - franka data has no progress labels)
  progress_detection:
    enabled: false
    loss_weight: 0.5
    hidden_dim: 512

  # EMA settings
  ema:
    enabled: false
    update_after_step: 0
    inv_gamma: 1.0
    power: 0.75
    min_value: 0.0
    max_value: 0.9999

# Training configuration
training:
  batch_size: 12
  max_steps: 100000
  learning_rate: 5.0e-5
  wan_learning_rate: 5.0e-5      # WAN backbone LR
  vlm_learning_rate: 5.0e-5       # VLM LR
  weight_decay: 0.01
  gradient_accumulation_steps: 1  # Effective batch size = batch_size * gradient_accumulation_steps * num_gpus

  scheduler_type: "linear"
  warmup_steps: 200
  cycle_length: 5000000   # Total cycle length for scheduler
  f_max: 0.99           # Maximum learning rate multiplier after warmup
  f_min: 0.4            # Minimum learning rate multiplier at end

  grad_clip_norm: 0.5
  use_amp: true
  find_unused_parameters: false

# System settings
system:
  checkpoint_dir: "/home/ma-user/work/wx1513998/Motus_initial/checkpoints/checkpoints_wan_vlm_mask_franka"
  log_level: "INFO"

  log_interval: 1
  save_interval: 10000
  val_interval: 500

  num_workers: 16
  pin_memory: true

# Logging settings
logging:
  report_to: "tensorboard"  # Options: "wandb", "tensorboard", "all", "none"
  wandb_project: "motus-wan-vlm"
  tensorboard_log_dir: "/home/ma-user/work/wx1513998/Motus_initial/tensorboard_wan_vlm_mask_franka"
  run_name: null  # Will use timestamp if null

# Resume training settings
resume:
  checkpoint_path: null

# Finetune settings (load pretrained weights, skip action_expert.input_encoder/decoder due to dim change 14->7)
finetune:
  checkpoint_path: "/home/ma-user/work/wx1513998/checkpoints/88"
