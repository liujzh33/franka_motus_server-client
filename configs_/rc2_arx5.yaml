common:
  action_dim: 7          # ARX5: 7 DOF single arm
  state_dim: 7

  num_video_frames: 8
  video_height: 384
  video_width: 320

  global_downsample_rate: 3
  video_action_freq_ratio: 2

dataset:
  type: "rc2"
  dataset_dir: "/cache/wwx1484778/Pretraindata/RC2.0/RoboChallenge2.0_ARX5"
  robot_type: "ARX5"
  task_mode: "multi"
  max_episodes: null
  image_aug: false

model:
  wan:
    config_path: "/cache/wwx1484778/motus_weights/Wan2.2-TI2V-5B"
    checkpoint_path: "/cache/wwx1484778/motus_weights/Wan2.2-TI2V-5B"
    vae_path: "/cache/wwx1484778/motus_weights/Wan2.2-TI2V-5B/Wan2.2_VAE.pth"
    precision: "bfloat16"

  vlm:
    checkpoint_path: "/cache/wwx1484778/motus_weights/Qwen3-VL-2B-Instruct"
    precision: "bfloat16"
    frozen: true

  action_expert:
    hidden_size: 1024
    ffn_dim_multiplier: 4
    norm_eps: 1e-5

  und_expert:
    hidden_size: 512
    ffn_dim_multiplier: 4
    norm_eps: 1e-5
    vlm:
      input_dim: 2048
      projector_type: "mlp3x_silu"

  time_distribution:
    timestep_sample_method: "logit_normal"
    sigmoid_scale: 1.0
    min_t: 0.0
    max_t: 1.0

  inference:
    num_inference_timesteps: 10

  loss_weights:
    video_loss_weight: 1.0
    action_loss_weight: 1.0

  ema:
    enabled: false

training:
  batch_size: 8
  max_steps: 40000
  learning_rate: 5.0e-5
  weight_decay: 0.01
  scheduler_type: "linear"
  warmup_steps: 200
  cycle_length: 5000000
  f_max: 0.99
  f_min: 0.4
  grad_clip_norm: 0.5
  use_amp: true
  find_unused_parameters: false

system:
  checkpoint_dir: "/cache/wwx1484778/motus/checkpoints_motus_rc2_arx5"
  log_level: "INFO"
  log_interval: 1
  save_interval: 20000
  val_interval: 500
  num_workers: 16
  pin_memory: true

logging:
  report_to: "tensorboard"
  tensorboard_log_dir: "/cache/wwx1484778/motus/tensorboard_logs_motus_rc2_arx5"
  run_name: null

resume:
  checkpoint_path: null

finetune:
  checkpoint_path: "/cache/wwx1484778/motus_weights/Motus_stage2"
